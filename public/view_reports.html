<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Reports | Campus Eco</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .report-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .report-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: var(--radius-md);
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .report-location {
            font-weight: 600;
            color: var(--text-dark);
        }
        .report-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .report-desc {
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="index.html" class="brand">
            <i class="fa-solid fa-leaf"></i>
            <span>EcoCampus</span>
        </a>
        <ul class="nav-links">
            <li>
                <a href="index.html" class="nav-link">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="report.html" class="nav-link">
                    <i class="fa-solid fa-camera"></i>
                    <span>Report Issue</span>
                </a>
            </li>
            <li>
                <a href="view_reports.html" class="nav-link active">
                    <i class="fa-solid fa-images"></i>
                    <span>View Reports</span>
                </a>
            </li>
            <li>
                <a href="locations.html" class="nav-link">
                    <i class="fa-solid fa-trash-can"></i>
                    <span>Bin Locations</span>
                </a>
            </li>
            <li>
                <a href="settings.html" class="nav-link">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
            </li>
            <li>
                <a href="qr.html" class="nav-link">
                    <i class="fa-solid fa-qrcode"></i>
                    <span>QR Posters</span>
                </a>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <header>
            <div class="page-title">
                <h1>Submitted Reports</h1>
                <p>View all waste issues reported by the community.</p>
            </div>
            <div class="user-profile">
                <div class="profile-img">A</div>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="card" style="grid-column: span 12;">
                <div class="card-title">Recent Reports</div>
                <div id="reports-container" class="report-grid">
                    <div style="text-align: center; padding: 20px; color: var(--text-muted); grid-column: 1 / -1;">Loading reports...</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="js/main.js"></script>
<script>
    window.deleteReport = async function(id) {
        if (!confirm('Are you sure you want to delete this report?')) return;
        try {
            const res = await fetch('/api/reports/' + id, { method: 'DELETE' });
            if (res.ok) {
                location.reload();
            } else {
                alert('Failed to delete report.');
            }
        } catch (e) {
            console.error(e);
            alert('Error deleting report.');
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        fetch('/api/reports')
            .then(res => res.json())
            .then(resData => {
                const container = document.getElementById('reports-container');
                const data = resData.data;
                if (!data || data.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted); grid-column: 1 / -1;">No reports found.</div>';
                    return;
                }
                
                container.innerHTML = '';
                data.forEach(report => {
                    const d = new Date(report.timestamp);
                    const timeString = d.toLocaleString();
                    const imageHtml = report.image_url 
                        ? `<img src="${report.image_url}" alt="Report" onerror="this.onerror=null; this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'; this.style.background='#000';">`
                        : `<div style="width: 100%; height: 150px; background: #000; border-radius: var(--radius-md);"></div>`;

                    const card = document.createElement('div');
                    card.className = 'report-card';
                    card.innerHTML = `
                        ${imageHtml}
                        <div class="report-header">
                            <span class="report-location"><i class="fa-solid fa-location-dot" style="color:var(--text-muted);margin-right:5px;"></i> ${report.location}</span>
                            <span class="report-time">${timeString}</span>
                        </div>
                        <div class="report-desc">${report.description || 'No description provided.'}</div>
                        <button onclick="deleteReport(${report.id})" class="btn" style="margin-top:auto; background:#F44336; border:none; padding:8px; border-radius:4px; color:white; cursor:pointer;"><i class="fa-solid fa-trash"></i> Delete</button>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(err => {
                console.error('Error fetching reports:', err);
                document.getElementById('reports-container').innerHTML = '<div style="text-align: center; padding: 20px; color: red; grid-column: 1 / -1;">Error loading reports.</div>';
            });
    });
</script>
</body>
</html>
