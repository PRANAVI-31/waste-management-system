<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eco-Waste Smart Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="card login-card">
        <div class="login-header">
            <i class="fa-solid fa-recycle"></i>
            <h1>Eco-Smart System</h1>
            <p>Welcome back! Please login to your account.</p>
        </div>

        <div id="error-box" class="error-message">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="error-text">Invalid username or password.</span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" required>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="remember">
                <label for="remember" style="font-size: 0.9rem; color: var(--text-muted);">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                Login to Dashboard
            </button>
        </form>

        <div class="login-footer">
            <p>New here? <a href="signup.html">Create an Account</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
