<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Eco-Waste Smart Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="card login-card">
        <div class="login-header">
            <i class="fa-solid fa-leaf"></i>
            <h1>Join Eco-Smart</h1>
            <p>Create your staff account to start managing campus waste.</p>
        </div>

        <div id="error-box" class="error-message">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="error-text">Please fill in all fields correctly.</span>
        </div>

        <form id="signup-form">
            <div class="form-group">
                <label class="form-label" for="fullname">Full Name</label>
                <input type="text" id="fullname" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="username">Staff Username</label>
                <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fa-solid fa-user-plus"></i>
                Create Account
            </button>
        </form>

        <div class="login-footer">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
